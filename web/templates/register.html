<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — YeboBank</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;">
<div style="width:100%;max-width:400px;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2rem;font-weight:800;color:var(--forest);">⚡ YeboBank</div>
    <p style="color:var(--text-muted);margin-top:0.5rem;">Open your free Bitcoin account</p>
  </div>

  {{if .Error}}
  <div class="alert alert-error">{{.Error}}</div>
  {{end}}

  <div class="card">
    <form method="POST" action="/register">
      <div class="form-group">
        <label for="full_name">Full name</label>
        <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Jane Wanjiru" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" class="form-control" placeholder="+254 700 000 000" required autocomplete="tel">
        <div class="form-hint">Used as your login. M-Pesa deposits go to this number.</div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Create Account</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted);font-size:0.9rem;">
    Already have an account? <a href="/login">Sign in</a>
  </p>
  <p style="text-align:center;margin-top:0.5rem;color:var(--text-dim);font-size:0.78rem;">
    YeboBank is custodial. We hold your sats securely. Open source — <a href="https://github.com/yebobank/yebobank">read the code</a>.
  </p>
</div>
</body>
</html>
