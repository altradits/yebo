{{template "layout.html" .}}
{{define "content"}}
<div class="page-header">
  <h1>Agent Dashboard</h1>
  <p>{{.BusinessName}} · {{.Location}}</p>
</div>

<div class="stat-grid">
  <div class="stat-tile">
    <div class="label">Float Balance</div>
    <div class="value">{{.FloatSats}}</div>
    <div class="sub">≈ KES {{printf "%.2f" .FloatKES}}</div>
  </div>
  <div class="stat-tile">
    <div class="label">Status</div>
    <div class="value" style="font-size:1rem;"><span class="badge {{if eq .Status "active"}}badge-green{{else}}badge-amber{{end}}">{{.Status}}</span></div>
  </div>
  <div class="stat-tile">
    <div class="label">Commission</div>
    <div class="value" style="font-size:1.2rem;">{{.CommissionBPS}} BPS</div>
  </div>
</div>

<div class="action-grid" style="grid-template-columns:repeat(2,1fr);">
  <a href="/agent/cashin" class="action-btn">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
    Cash In
  </a>
  <a href="/agent/cashout" class="action-btn">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    Cash Out
  </a>
</div>
{{end}}
