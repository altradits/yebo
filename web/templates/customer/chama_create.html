{{template "layout.html" .}}
{{define "content"}}
<div class="page-header">
  <h1>Create Chama</h1>
  <p>Start a community savings group</p>
</div>

{{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}

<div class="card" style="max-width:480px;">
  <form method="POST" action="/chama/create">
    <div class="form-group">
      <label>Group name</label>
      <input type="text" name="name" class="form-control" placeholder="e.g. Mama Mboga Savings" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" name="description" class="form-control" placeholder="What is this chama for?">
    </div>
    <div class="form-group">
      <label>Max members</label>
      <input type="number" name="max_members" class="form-control mono" placeholder="20" min="2" max="100" value="20">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create Chama</button>
  </form>
</div>
{{end}}
