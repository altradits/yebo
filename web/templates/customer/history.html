{{template "layout.html" .}}
{{define "content"}}
<div class="page-header">
  <h1>Transaction History</h1>
</div>

<div class="card">
  {{if .Entries}}
  <div class="tx-list">
    {{range .Entries}}
    <div class="tx-item">
      <div class="tx-icon {{if .IsCredit}}credit{{else}}debit{{end}}">
        {{if .IsCredit}}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
        {{else}}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        {{end}}
      </div>
      <div class="tx-label">
        <div class="type">{{.Type}}</div>
        <div class="note" style="color:var(--text-dim);font-size:0.8rem;">{{.Note}}</div>
        <div class="time" style="color:var(--text-dim);font-size:0.75rem;">{{.CreatedAt}}</div>
      </div>
      <div class="tx-amount {{if .IsCredit}}credit{{else}}debit{{end}}">
        {{if .IsCredit}}+{{else}}-{{end}}{{.AmountSats}} sats
      </div>
    </div>
    {{end}}
  </div>
  {{else}}
  <p style="color:var(--text-dim);font-size:0.9rem;padding:1rem 0;">No transactions yet.</p>
  {{end}}
</div>
{{end}}
