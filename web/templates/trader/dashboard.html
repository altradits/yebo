{{template "layout.html" .}}
{{define "content"}}
<div class="page-header">
  <h1>Trader Dashboard</h1>
</div>

{{if .Error}}
<div class="alert alert-error" style="margin-bottom:1rem;">{{.Error}}</div>
{{end}}

<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem;">
  <div class="card" style="text-align:center;padding:1.5rem;">
    <div style="font-size:1.8rem;font-weight:700;color:var(--orange);">{{.TotalLocked}}</div>
    <div style="color:var(--text-dim);font-size:0.9rem;margin-top:0.25rem;">Sats Locked</div>
  </div>
  <div class="card" style="text-align:center;padding:1.5rem;">
    <div style="font-size:1.8rem;font-weight:700;color:var(--orange);">{{.DistributionCount}}</div>
    <div style="color:var(--text-dim);font-size:0.9rem;margin-top:0.25rem;">Distributions Run</div>
  </div>
</div>

<div class="card">
  <div class="card-header">Actions</div>
  <div style="padding:1rem 0;">
    <form method="POST" action="/trader/distribute" onsubmit="return confirm('Run interest distribution now?')">
      <button type="submit" class="btn btn-primary">Run Interest Distribution</button>
    </form>
  </div>
  <div style="margin-top:0.5rem;">
    <a href="/trader/assets" class="btn btn-outline btn-sm">Treasury Assets</a>
    <a href="/trader/profit" class="btn btn-outline btn-sm" style="margin-left:0.5rem;">Profit History</a>
  </div>
</div>
{{end}}
