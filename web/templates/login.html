<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — YeboBank</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;">
<div style="width:100%;max-width:400px;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-size:2rem;font-weight:800;color:var(--forest);">⚡ YeboBank</div>
    <p style="color:var(--text-muted);margin-top:0.5rem;">Sign in to your account</p>
  </div>

  {{if .Registered}}
  <div class="alert alert-success">Account created! Sign in below.</div>
  {{end}}
  {{if .Error}}
  <div class="alert alert-error">{{.Error}}</div>
  {{end}}

  <div class="card">
    <form method="POST" action="/login">
      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" class="form-control" placeholder="+254 700 000 000" required autocomplete="tel">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Sign In</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted);font-size:0.9rem;">
    No account? <a href="/register">Create one free</a>
  </p>
</div>
</body>
</html>
