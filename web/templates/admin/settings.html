{{template "layout.html" .}}
{{define "content"}}
<div class="page-header">
  <h1>Pool Settings</h1>
</div>

{{if .Saved}}
<div class="alert alert-success" style="margin-bottom:1rem;">Settings saved.</div>
{{end}}

<div class="card">
  <form method="POST" action="/admin/settings">
    <div class="form-group">
      <label>Annual Interest Rate (basis points)</label>
      <input type="number" name="rate_bps" value="{{.RateBPS}}" min="0" max="10000" required class="form-input">
      <small style="color:var(--text-dim);">100 bps = 1% per year</small>
    </div>
    <div class="form-group">
      <label>Lock Period (days)</label>
      <input type="number" name="lock_days" value="{{.LockDays}}" min="1" required class="form-input">
    </div>
    <div class="form-group">
      <label>Minimum Savings (sats)</label>
      <input type="number" name="min_sats" value="{{.MinSats}}" min="1" required class="form-input">
    </div>
    <div class="form-group">
      <label>Maximum Savings (sats)</label>
      <input type="number" name="max_sats" value="{{.MaxSats}}" min="0" class="form-input">
      <small style="color:var(--text-dim);">0 = no maximum</small>
    </div>
    <button type="submit" class="btn btn-primary">Save Settings</button>
  </form>
</div>
{{end}}
