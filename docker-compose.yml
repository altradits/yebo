version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: yebobank
      POSTGRES_USER: yebobank
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yebobank"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_URL: postgres://yebobank:${DB_PASSWORD:-change_me}@postgres:5432/yebobank?sslmode=disable
    ports:
      - "127.0.0.1:8080:8080"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

volumes:
  pgdata:
  certbot_www:
  certbot_certs:
